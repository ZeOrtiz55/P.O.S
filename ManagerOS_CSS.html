<style>
    :root { --bg-body: #F1F5F9; --bg-card: #FFFFFF; --primary: #6366F1; --accent: #0EA5E9; --text-main: #1E293B; --text-muted: #64748B; --border: #E2E8F0; --st-orcamento: #3B82F6; --st-execucao: #F59E0B; --st-ok: #10B981; --st-cancel: #EF4444; }
    * { box-sizing: border-box; outline: none; }
    body { font-family: 'Poppins', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    header { height: 85px; background: #0F172A; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; color: #fff; z-index: 100; flex-shrink: 0; }
    .brand-area { display: flex; align-items: center; gap: 15px; }
    .brand-icon { width: 45px; height: 45px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: white; }
    .header-actions { display: flex; align-items: center; gap: 10px; }
    .btn-top { padding: 0 18px; border-radius: 8px; font-weight: 600; font-size: 11px; color: #fff; display: flex; align-items: center; justify-content: center; gap: 8px; height: 42px; white-space: nowrap; border: none; cursor: pointer; text-decoration: none; }
    .btn-report { background: #334155; }
    .btn-cli { background: #10B981; }
    .btn-new { background: linear-gradient(135deg, var(--primary), var(--accent)); }
    .btn-menu { background: rgba(255,255,255,0.1); }
    .search-input { width: 320px; padding: 10px 15px 10px 45px; border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; background: rgba(255,255,255,0.05); color: #fff; font-size: 13px; }
    .filter-bar { background-color: #fff; border-bottom: 1px solid var(--border); display: flex; width: 100%; padding: 10px 20px; gap: 8px; overflow-x: auto; flex-shrink: 0; }
    .filter-btn { flex: 1; min-width: 140px; background: #F8FAFC; border: 1px solid var(--border); color: var(--text-muted); padding: 5px; border-radius: 8px; font-size: 10px; font-weight: 700; cursor: pointer; text-align: center; min-height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .kanban-wrapper { flex: 1; overflow-y: auto; padding: 20px; background-image: radial-gradient(#CBD5E1 1px, transparent 1px); background-size: 24px 24px; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; align-content: flex-start; }
    .card { background-color: var(--bg-card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); border-left: 4px solid transparent; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
    .drawer-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(2px); z-index: 200; display: none; justify-content: center; align-items: flex-start; padding-top: 40px; padding-bottom: 40px; overflow-y: auto; }
    .drawer-overlay.active { display: flex; }
    .modal-container { display: flex; gap: 20px; max-width: 1250px; width: 100%; justify-content: center; padding: 0 20px; }
    .drawer { width: 850px; background: #fff; border-radius: 12px; display: none; flex-direction: column; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25); overflow: hidden; }
    .log-panel { width: 380px; background: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; flex-direction: column; border: 1px solid var(--border); overflow:hidden;}
    label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
    input, select, textarea { width: 100%; padding: 12px 15px; border: 1px solid var(--border); border-radius: 6px; font-family: 'Poppins', sans-serif; background: #fff; margin-bottom: 15px; }
    #loading { position: fixed; top: 20px; right: 30px; background: var(--primary); color: #fff; padding: 10px 25px; border-radius: 30px; font-size: 13px; font-weight: 700; z-index: 400; display: none; }
    .spinner-inner { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #fff; border-radius: 50%; width: 16px; height: 16px; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .search-row { cursor: pointer; transition: 0.2s; }
    .search-row:hover { background: #F1F5F9; }
    .alert-box { padding: 12px 15px; border-radius: 8px; font-size: 12px; font-weight: 600; margin-bottom: 15px; display: none; }
    .alert-warning { background: #FFF7ED; border: 1px solid #F97316; color: #C2410C; }
</style>
